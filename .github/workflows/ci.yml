name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify (lint, typecheck, test, build)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests (with coverage)
        run: pnpm test:coverage

      - name: Build
        run: pnpm build

      # `pnpm audit` was retired: npm permanently removed the legacy audit
      # endpoint it calls (HTTP 410 on every pnpm version, 9.x and 10.x alike),
      # so it can no longer surface advisories. Replaced with OSV-Scanner, which
      # reads pnpm-lock.yaml against the OSV.dev database and does not depend on
      # npm's endpoint. Binary is pinned to a version + SHA-256 (supply-chain
      # hardening); it exits non-zero when any known vulnerability is found, so
      # this step blocks the build on dependency advisories.
      - name: Audit dependencies for known vulnerabilities (OSV-Scanner)
        run: |
          OSV_VERSION="v2.3.8"
          OSV_SHA256="bc98e15319ed0d515e3f9235287ba53cdc5535d576d24fd573978ecfe9ab92dc"
          curl -sSfL "https://github.com/google/osv-scanner/releases/download/${OSV_VERSION}/osv-scanner_linux_amd64" -o "$RUNNER_TEMP/osv-scanner"
          echo "${OSV_SHA256}  $RUNNER_TEMP/osv-scanner" | sha256sum -c -
          chmod +x "$RUNNER_TEMP/osv-scanner"
          "$RUNNER_TEMP/osv-scanner" scan -L pnpm-lock.yaml
