# OSV-Scanner configuration — dependency-advisory baseline (NOW EMPTY)
# =====================================================================
# The CI "Verify" job scans pnpm-lock.yaml with OSV-Scanner and BLOCKS on any
# known vulnerability (`osv-scanner scan --config=osv-scanner.toml -L
# pnpm-lock.yaml`, pinned v2.3.8). This file is intentionally kept (CI passes
# `--config=osv-scanner.toml`) but carries NO ignored advisories.
#
# History: when the blocking gate was introduced (2026-07-16, RESUME §3Z) it
# surfaced 27 pre-existing advisories that had been latent while the previous
# `pnpm audit` step was silently broken (npm retired its endpoint → HTTP 410).
# Those were temporarily BASELINED here, then fully REMEDIATED (2026-07-16,
# RESUME §3AA):
#
#   • 26 of the 27 advisories (undici×11, tar×4, minimatch×3, path-to-regexp×3,
#     sandbox×2, ajv, smol-toml, @tootallnate/once) all traced — via `pnpm why`
#     — to a SINGLE root devDependency: `vercel ^55.0.0` (the Vercel CLI). That
#     dep was added accidentally by a local `vercel deploy` (commit dfcf476,
#     "founder Vercel-CLI deploy stragglers"); no script, CI job, or app import
#     used it. Removing it dropped every one of those advisories (and ~2.4k lines
#     of lockfile). Deploys are unaffected: Vercel builds via Git integration and
#     `npx vercel` still works on demand.
#   • The 27th (esbuild 0.28.0 → GHSA-g7r4-m6w7-qqqr) is a genuine transitive of
#     `vite` (app build). Fixed by tightening the `pnpm.overrides` esbuild floor
#     to `>=0.28.1` (root package.json) so the whole tree resolves to 0.28.1.
#
# ⚠ Do NOT add IgnoredVulns entries here to silence NEW advisories — fix the
# dependency instead (bump via pnpm.overrides, or drop the pulling dep). The gate
# is meant to block; this file staying empty is the goal.
