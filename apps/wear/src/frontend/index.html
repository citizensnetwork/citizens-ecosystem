<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<title>Citizens Wear</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

<style>
  :root {
    --gold: #F2BA1B;
    --ink: #1a1a1a;
    --muted: #a09e97;
    --muted-2: #9a9892;
    --bg-page: #fbfaf8;
    --bg-soft: #f2f0ea;
    --bg-chip: #f4f2ec;
    --border: #f0eee9;
    --border-soft: #f3f1ee;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body, #root { height: 100%; }
  body {
    margin: 0; background: #fff; color: #1a1a1a;
    font-family: 'Manrope', system-ui, sans-serif; -webkit-font-smoothing: antialiased;
    overscroll-behavior: none;
  }
  input, textarea, select, button { font-family: inherit; }
  button { cursor: pointer; }
  a { color: inherit; }
  .cwsc { scrollbar-width: none; }
  .cwsc::-webkit-scrollbar { width: 0; height: 0; display: none; }
  .fade-in { animation: cwUp .3s ease-out; }
  @keyframes cwUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  .scale-in { animation: cwScaleIn .25s cubic-bezier(.34,1.3,.64,1); }
  @keyframes cwScaleIn { from { transform: scale(.97); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .spin { animation: cwSpin 1s linear infinite; }
  @keyframes cwSpin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Supabase auth: UMD client + runtime config + browser auth wrapper.
     Plain scripts (run before Babel transforms the app below). -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

<!-- Cache-busting for the no-build dev server (python http.server sends no
     cache headers). Bump ?v= when editing auth-client.js or any app/*.jsx.
     The production build (scripts/build-frontend.js) replaces all of these
     tags with hashed, precompiled bundles — no Babel, no ?v=. -->
<script src="auth-client.js?v=20260714a"></script>

<script type="text/babel" src="app/icons.jsx?v=20260714a"></script>
<script type="text/babel" src="app/api.jsx?v=20260714a"></script>
<script type="text/babel" src="app/store.jsx?v=20260714a"></script>
<script type="text/babel" src="app/ui.jsx?v=20260714a"></script>
<script type="text/babel" src="app/auth.jsx?v=20260714a"></script>
<script type="text/babel" src="app/home.jsx?v=20260714a"></script>
<script type="text/babel" src="app/discover.jsx?v=20260714a"></script>
<script type="text/babel" src="app/create.jsx?v=20260714a"></script>
<script type="text/babel" src="app/inbox.jsx?v=20260714a"></script>
<script type="text/babel" src="app/post.jsx?v=20260714a"></script>
<script type="text/babel" src="app/brand.jsx?v=20260714a"></script>
<script type="text/babel" src="app/profile.jsx?v=20260714a"></script>
<script type="text/babel" src="app/concepts.jsx?v=20260714a"></script>
<script type="text/babel" src="app/adminq.jsx?v=20260714a"></script>
<script type="text/babel" src="app/settings.jsx?v=20260714a"></script>
<script type="text/babel" src="app/shell.jsx?v=20260714a"></script>
<script type="text/babel" src="app/app.jsx?v=20260714a"></script>
</body>
</html>
