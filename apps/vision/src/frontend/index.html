<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Citizens Vision</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

<style>
  /* ============================================================
     Citizens Design System tokens (design-handoff _ds/tokens) —
     one gold metal, warm neutrals, Light (default) + Noir looks.
     ============================================================ */
  :root {
    /* Kingdom Gold ramp */
    --gold-50:#FEF8E2; --gold-100:#FCEEB8; --gold-200:#F9E08A; --gold-300:#F6D257;
    --gold-400:#F3C636; --gold-500:#F0C024; --gold-600:#D9A50C; --gold-700:#B07F08;
    --gold-800:#845E06; --gold-900:#523A05;
    --gold-antique:#D4AF37;

    /* Warm neutrals */
    --paper:#FFFFFF; --ground:#E9E7E1; --mist:#FEF5F5; --muted:#F2F0EB;
    --n-300:#DCD9D2; --n-400:#A8A59C; --n-500:#8B887F; --n-700:#3A3A3A;
    --n-800:#1A1A1A; --n-900:#0E0E0E; --ink:#000000;

    /* Semantic & status */
    --success:#16A34A; --success-bg:#DCFCE7;
    --danger:#DC2626;  --danger-bg:#FEE2E2;
    --warning:#D97706; --warning-bg:#FEF3C7;
    --info:#2563EB;    --admin:#8E44AD;

    /* Semantic aliases — LIGHT look (default) */
    --brand:var(--gold-500); --brand-strong:var(--gold-600);
    --brand-ink:var(--gold-700); --on-brand:var(--ink);
    --surface-app:var(--ground); --surface-card:var(--paper);
    --surface-sunk:var(--muted); --surface-inverse:var(--n-900);
    --text-primary:var(--ink); --text-secondary:var(--n-500);
    --text-tertiary:var(--n-400); --text-on-inverse:var(--paper);
    --border:var(--n-300); --border-strong:var(--n-400); --divider:var(--n-300);
    --ring:var(--gold-500); --overlay-scrim:rgba(14,14,14,0.55);
  }
  [data-theme="noir"] {
    --surface-app:var(--n-900); --surface-card:var(--n-800);
    --surface-sunk:#161616; --surface-inverse:var(--paper);
    --text-primary:var(--paper); --text-secondary:#B8B5AC;
    --text-tertiary:var(--n-500); --text-on-inverse:var(--ink);
    --brand-ink:var(--gold-400);
    --border:rgba(255,255,255,0.10); --border-strong:rgba(255,255,255,0.18);
    --divider:rgba(255,255,255,0.08); --overlay-scrim:rgba(0,0,0,0.62);
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body, #root { height: 100%; }
  body {
    margin: 0; background: var(--surface-app); color: var(--text-primary);
    font-family: 'Manrope', ui-sans-serif, sans-serif;
    -webkit-font-smoothing: antialiased; overscroll-behavior: none;
    transition: background .25s ease, color .25s ease;
  }
  input, textarea, select, button { font-family: inherit; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(139,136,127,0.35); border-radius: 3px; }

  .fade-in { animation: fadeIn .28s ease-out; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .spin { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Supabase auth: UMD client + runtime config + browser auth wrapper.
     Plain scripts (run before Babel transforms the app below). -->

<script src="auth-client.js?v=1"></script>

<script type="text/babel" src="app/store.jsx?v=1"></script>
<script type="text/babel" src="app/live.jsx?v=1"></script>
<script type="text/babel" src="app/ui.jsx?v=1"></script>
<script type="text/babel" src="app/login.jsx?v=1"></script>
<script type="text/babel" src="app/home.jsx?v=1"></script>
<script type="text/babel" src="app/views.jsx?v=1"></script>
<script type="text/babel" src="app/shell.jsx?v=1"></script>
<script type="text/babel" src="app/app.jsx?v=1"></script>
</body>
</html>
